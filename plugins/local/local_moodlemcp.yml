summary: Turn a Moodle site into a remote MCP (Model Context Protocol) server with
  OAuth 2.1 authorization, so users can connect Claude.ai (or any other MCP client)
  and ask the LLM to read their Moodle data — courses, assignments, grades, forums,
  files — using natural language. No personal web-service tokens
