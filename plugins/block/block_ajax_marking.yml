summary: A plugin for Moodle that displays all of a teacher's unmarked work from across
  the site in one block. The interface is an expandable AJAX-loading tree (course
  -> activity -> user), which provides a pop-up when a user is clicked, which allows
  the work to be marked without leaving the page.
