summary: The Moodle Proctoring plugin is a Quiz Access plugin designed to capture
  a user's picture via webcam to identify the individual attempting the Moodle quiz.
  It automatically captures images from the user's webcam at 30-second intervals (or
  any configurable time gap) and stores them as PNG files. Admi
