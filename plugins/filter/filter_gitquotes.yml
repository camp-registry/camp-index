summary: This plugin extends the default Markdown filter in Moodle by adding support
  for git-style quotes, such as [!NOTE], [!TIP], [!IMPORTANT], and [!WARNING]. It
  also applies custom styles to standard blockquotes, providing better visual distinction
  between different types of quotes.
